name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: Tests & quality gates
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: jdx/mise-action@v4

      - name: Install system packages
        run: sudo apt-get update -qq && sudo apt-get install -y -qq g++ clang-format

      - name: Set up service environment
        run: ./tools/setup-service-environment.sh

      - name: Bootstrap firmware toolchain
        run: mise run firmware:bootstrap

      - name: Run full verification
        run: mise run verify
        env:
          FORCE_COLOR: "1"
