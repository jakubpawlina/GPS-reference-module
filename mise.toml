[tools]
python = "3.13"
"aqua:arduino/arduino-cli" = "1.4.1"
"aqua:astral-sh/ruff" = "0.15.17"
"aqua:mvdan/sh" = "latest"
"aqua:koalaman/shellcheck" = "0.11.0"

# Doxygen is not available through mise's aqua registry as aqua:doxygen/doxygen.
# Install it separately with:
# sudo apt update && sudo apt install doxygen

[tasks.help]
description = "Start here: show the recommended development workflow"
run = "./tools/show-workflows.sh"

[tasks."firmware:bootstrap"]
description = "First setup: install the ESP32 core and Arduino libraries"
run = "./tools/setup-firmware-toolchain.sh"

[tasks."firmware:compile"]
description = "Build only the ESP32 firmware"
run = "./tools/run-firmware-checks.sh compile"

[tasks."service:bootstrap"]
description = "First setup: create the service test environment and install Python dependencies"
run = "./tools/setup-service-environment.sh"

[tasks."service:dev"]
description = "Develop: run the service locally with fake GPS data (no hardware needed)"
run = "trap '' INT; exec .venv/bin/python tools/run-service-dev.py"

[tasks."docs:generate"]
description = "Docs: generate firmware API documentation"
run = "./tools/run-firmware-checks.sh docs"

[tasks."docs:serve"]
description = "Docs: generate and serve firmware API documentation"
run = "trap '' INT; exec python3 tools/serve-firmware-docs.py"

[tasks."deploy:install"]
description = "Deploy: install or upgrade the Raspberry Pi service"
run = "./tools/deploy-rpi-service.sh"

[tasks."deploy:uninstall"]
description = "Deploy: remove the Raspberry Pi service"
run = "./tools/deploy-rpi-service.sh --uninstall"

[tasks."simulation:generate"]
description = "Wokwi: generate sources only, without build artifacts"
run = "./tools/generate-wokwi-project.sh"

[tasks."simulation:build"]
description = "Wokwi: build/rebuild the complete VS Code project"
run = "./tools/build-wokwi-project.sh"

[tasks."test:unit"]
description = "Develop: run fast firmware logic tests"
run = "./tools/run-tests.sh unit"

[tasks."test:integration"]
description = "Develop: test firmware runtime and simulated peripherals"
run = "./tools/run-tests.sh integration"

[tasks."test:simulation"]
description = "Develop: test Wokwi assets, generator, and GPS chip"
run = "./tools/run-tests.sh simulation"

[tasks."test:service"]
description = "Develop: test Raspberry Pi storage, API validation, and lifecycle behavior"
run = "./tools/run-tests.sh service"

[tasks."test:all"]
description = "Before commit: run all host-side tests without Docker"
run = "./tools/run-tests.sh all"

[tasks.verify]
description = "Before PR: run all tests and builds (requires Docker)"
run = "./tools/run-verification.sh"

[tasks.format]
description = "Format: auto-format Python (ruff), C++ (clang-format), and shell (shfmt)"
run = "./tools/run-format.sh"

[tasks."format:check"]
description = "Format: verify formatting without making changes (CI gate)"
run = "./tools/run-format.sh --check"

[tasks.lint]
description = "Lint: static analysis for Python (ruff check) and shell (shfmt)"
run = "./tools/run-lint.sh"

[tasks."lint:fix"]
description = "Lint: auto-fix Python issues (ruff check --fix)"
run = "./tools/run-lint.sh --fix"
