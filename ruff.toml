line-length = 100
target-version = "py39"

[lint]
select = ["E", "W", "F", "I", "UP"]

[lint.per-file-ignores]
# Embedded HTML/JS template strings cannot be wrapped at 100 chars without
# breaking readability. Ignore E501 for the file that owns the dashboard HTML.
"service/api.py" = ["E501"]
# Imports intentionally after the venv re-exec guard; E402 is expected.
"tools/run-service-dev.py" = ["E402"]

[format]
quote-style = "double"
indent-style = "space"
